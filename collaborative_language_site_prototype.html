<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>One Language Project</title>
<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
h1{margin-bottom:10px}
.container{background:white;padding:20px;border-radius:10px;max-width:800px}
input,button{padding:8px;margin:5px}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
.vote{cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>🌍 공동 언어 프로젝트</h1>
<p>새 단어를 제안하고 투표하세요.</p>

<h3>단어 제안</h3>
<input id="word" placeholder="단어">
<input id="meaning" placeholder="뜻">
<button onclick="addWord()">추가</button>

<h3>사전</h3>
<table>
<thead>
<tr>
<th>단어</th>
<th>뜻</th>
<th>👍</th>
<th>👎</th>
</tr>
</thead>
<tbody id="dict"></tbody>
</table>
</div>

<script>
let words = []

function render(){
const table=document.getElementById('dict')
table.innerHTML=""

words.forEach((w,i)=>{
const row=document.createElement('tr')
row.innerHTML=`
<td>${w.word}</td>
<td>${w.meaning}</td>
<td class="vote" onclick="up(${i})">${w.up}</td>
<td class="vote" onclick="down(${i})">${w.down}</td>
`
table.appendChild(row)
})
}

function addWord(){
const word=document.getElementById('word').value
const meaning=document.getElementById('meaning').value

if(!word||!meaning)return

words.push({word,meaning,up:0,down:0})
render()
}

function up(i){
words[i].up++
render()
}

function down(i){
words[i].down++
render()
}
</script>
</body>
</html>
