<!DOCTYPE html>
<html>
<head>
<title>Language Project</title>
</head>
<body>

<h1>🌍 Collaborative Language</h1>

<p>Add a new word:</p>

<input id="word" placeholder="word">
<input id="meaning" placeholder="meaning">
<button onclick="addWord()">Add</button>

<ul id="list"></ul>

<script>
let words=[]

function addWord(){
let w=document.getElementById("word").value
let m=document.getElementById("meaning").value

words.push(w+" = "+m)

let list=document.getElementById("list")
list.innerHTML=""

for(let i=0;i<words.length;i++){
list.innerHTML+="<li>"+words[i]+"</li>"
}
}
</script>

</body>
</html>
